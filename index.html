<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raid Leaderboard</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #111;
            color: white;
            text-align: center;
        }

        h1 {
            color: gold;
        }

        table {
            margin: auto;
            border-collapse: collapse;
            width: 60%;
        }

        th, td {
            padding: 10px;
            border: 1px solid #444;
        }

        th {
            background-color: #222;
        }

        tr:nth-child(even) {
            background-color: #1a1a1a;
        }
    </style>
</head>

<body>

<h1>Guild loli_hunter</h1>
<h2>Raid Damage Leaderboard</h2>

<table>
    <tr>
        <th>Rank</th>
        <th>Player</th>
        <th>Damage</th>
    </tr>

    <tr>
        <td>1</td>
        <td>malas</td>
        <td>999,999</td>
    </tr>

    <tr>
        <td>2</td>
        <td>babylon</td>
        <td>850,000</td>
    </tr>

</table>

</body>
</html>
