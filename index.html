<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raid Leaderboard</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #111;
            color: white;
            text-align: center;
        }

        h1 {
            color: gold;
        }

        table {
            margin: auto;
            border-collapse: collapse;
            width: 60%;
        }

        th, td {
            padding: 0; /* penting biar gambar full */
            border: 1px solid #444;
        }

        th {
            padding: 10px;
            background-color: #222;
        }

        tr:nth-child(even) {
            background-color: #1a1a1a;
        }

        td.profile-cell {
            width: 60px;
            height: 60px;
        }

        img.profile {
            width: 100%;
            height: 100%;
            object-fit: cover; /* isi penuh tanpa gepeng */
            display: block;
        }

        td:not(.profile-cell) {
            padding: 10px;
        }
    </style>
</head>

<body>

<h1>Guild loli_hunter</h1>
<h2>Raid Damage Leaderboard</h2>

<table>
    <tr>
        <th>Rank</th>
        <th>Profile</th>
        <th>Player</th>
        <th>Damage</th>
    </tr>

    <tr>
        <td>1</td>
        <td class="profile-cell">
            <img src="char potrait/Daisy_Myth.png" class="profile">
        </td>
        <td>malas</td>
        <td>999,999</td>
    </tr>

    <tr>
        <td>2</td>
        <td class="profile-cell">
            <img src="char potrait/Eunha_Myth.png" class="profile">
        </td>
        <td>babylon</td>
        <td>850,000</td>
    </tr>

    <tr>
        <td>3</td>
        <td class="profile-cell">
            <img src="char potrait/Eunha_Myth.png" class="profile">
        </td>
        <td>Nexora</td>
        <td>80,000</td>
    </tr>

</table>

</body>
</html>
